<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>출퇴근 QR 스캔</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    /* 기존 스타일 그대로 유지 */
    * { box-sizing: border-box; }
    body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; margin: 0; padding: 16px; background-color: #f0f2f5; text-align: center; }
    .header { background-color: #1a3a6b; color: #ffffff; padding: 18px; border-radius: 14px; margin-bottom: 16px; font-size: 22px; font-weight: bold; }
    .site-name { font-size: 26px; margin-top: 6px; }
    .guide-text { font-size: 19px; color: #444; margin: 14px 0; }
    #reader-wrapper { background: #ffffff; padding: 10px; border-radius: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 16px; }
    #reader { width: 100% !important; border: none !important; }
    #reader video { border-radius: 10px; object-fit: cover; }
    .btn { display: block; width: 100%; padding: 16px; font-size: 20px; font-weight: bold; color: #ffffff; background-color: #e67e22; border: none; border-radius: 14px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-decoration: none; margin-top: 10px; }
    .btn:active { background-color: #d35400; }
    .result-box { background: #ffffff; border-radius: 14px; padding: 30px 20px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .result-success { border: 4px solid #2ecc71; }
    .result-error { border: 4px solid #e74c3c; }
    .result-icon { font-size: 64px; margin-bottom: 16px; }
    .result-name { font-size: 28px; font-weight: bold; color: #333; margin-bottom: 8px; }
    .big-type { font-size: 36px; font-weight: bold; margin-bottom: 12px; }
    .type-checkin { color: #2ecc71; }
    .type-checkout { color: #3498db; }
    .result-time { font-size: 22px; color: #666; margin-bottom: 24px; }
    .error-text { font-size: 20px; color: #e74c3c; font-weight: bold; white-space: pre-line; line-height: 1.4; margin-bottom: 24px; }
    .hidden { display: none !important; }
    .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    .spinner { border: 6px solid #f3f3f3; border-top: 6px solid #1a3a6b; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 16px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-text { font-size: 20px; font-weight: bold; color: #1a3a6b; }
  </style>
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">시스템 연결 중...</div>
  </div>

  <div class="header">
    <div>근태관리 시스템</div>
    <div id="siteNameDisplay" class="site-name">사업장 확인 중...</div>
  </div>

  <div id="scanSection">
    <div class="guide-text">사각형 안내선 안에 QR코드를 맞춰주세요.</div>
    <div id="reader-wrapper">
      <div id="reader"></div>
    </div>
    <a id="manualLink" href="#" class="btn">수동 입력 (기록 정정)</a>
  </div>

  <div id="resultBox" class="result-box hidden">
    <div id="resultIcon" class="result-icon"></div>
    <div id="resultName" class="result-name"></div>
    <div id="resultType" class="big-type"></div>
    <div id="resultTime" class="result-time"></div>
    <div id="resultErrorText" class="error-text"></div>
    <button class="btn" onclick="restartScan()">다시 스캔하기</button>
  </div>

  <script>
    // [중요] 다음 단계에서 이 주소를 백엔드 API 주소로 변경해야 합니다.
    const GAS_API_URL = "여기에_GAS_웹앱_주소_입력"; 

    // 주소창에서 site 파라미터 직접 추출 (기존 <?= site ?> 대체)
    const urlParams = new URLSearchParams(window.location.search);
    const siteCode = urlParams.get('site');
    
    let html5QrCode = null;
    let isProcessing = false;

    window.addEventListener('DOMContentLoaded', () => {
      if (!siteCode) {
        showInitError("URL에 사업장코드(?site=...)가 없습니다.\n관리자에게 정확한 접속 주소를 요청하세요.");
        return;
      }
      
      // 수동입력 버튼 링크 세팅
      document.getElementById('manualLink').href = `manual.html?site=${siteCode}`;

      // 구글 전용 문법(google.script.run)을 표준 fetch API로 변경
      fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, // CORS 방지를 위해 text/plain 사용
        body: JSON.stringify({ action: 'getSiteInfo', siteCode: siteCode })
      })
      .then(response => response.json())
      .then(res => onSiteInfoReceived(res))
      .catch(err => showInitError("서버 통신 오류가 발생했습니다.\n네트워크 상태를 확인하세요."));
    });

    function onSiteInfoReceived(res) {
      document.getElementById('loadingOverlay').classList.add('hidden');
      if (res.success) {
        document.getElementById('siteNameDisplay').innerText = res.siteName;
        initCamera(); 
      } else {
        showInitError(res.message);
      }
    }

    function showInitError(msg) {
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('scanSection').classList.add('hidden');
      const box = document.getElementById('resultBox');
      box.classList.remove('hidden');
      box.className = 'result-box result-error';
      document.getElementById('resultIcon').innerText = '❌';
      document.getElementById('resultErrorText').innerText = msg;
      document.querySelector('#resultBox .btn').classList.add('hidden');
    }

    function initCamera() {
      html5QrCode = new Html5Qrcode("reader");
      const config = { 
        fps: 10, 
        qrbox: function(width, height) {
          const minDim = Math.min(width, height);
          return { width: Math.floor(minDim * 0.65), height: Math.floor(minDim * 0.65) };
        }
      };
      
      html5QrCode.start({ facingMode: "environment" }, config, onQrCodeSuccess)
      .catch(err => {
        console.log("후면 카메라 탐색 실패, 기본 카메라로 재시도합니다.", err);
        html5QrCode.start({ facingMode: "user" }, config, onQrCodeSuccess)
        .catch(err2 => {
          alert("카메라를 실행할 수 없습니다.\n\n[체크사항]\n1. 주소가 https:// 로 시작하는지 확인\n2. 브라우저 설정에서 카메라 권한을 '허용'했는지 확인");
        });
      });
    }

    function onQrCodeSuccess(decodedText) {
      if (isProcessing) return;
      isProcessing = true;
      if (html5QrCode && html5QrCode.isScanning) { html5QrCode.pause(); }

      document.getElementById('loadingOverlay').classList.remove('hidden');
      document.getElementById('loadingOverlay').querySelector('.loading-text').innerText = "근태 기록 중...";

      // 출퇴근 기록 전송 (fetch API 사용)
      fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'processQrScan', qrValue: decodedText, siteCode: siteCode })
      })
      .then(response => response.json())
      .then(res => onQrProcessResult(res))
      .catch(err => onQrProcessResult({ success: false, message: "서버 응답 오류가 발생했습니다." }));
    }

    function onQrProcessResult(res) {
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('scanSection').classList.add('hidden');
      const box = document.getElementById('resultBox');
      box.classList.remove('hidden');
      
      if (res.success) {
        box.className = 'result-box result-success';
        document.getElementById('resultIcon').innerText = '✅';
        document.getElementById('resultName').innerText = res.name + '님';
        const typeEl = document.getElementById('resultType');
        typeEl.innerText = res.type + ' 처리되었습니다';
        typeEl.className = (res.type === '출근') ? 'big-type type-checkin' : 'big-type type-checkout';
        document.getElementById('resultTime').innerText = '시각: ' + res.time;
        document.getElementById('resultErrorText').innerText = '';
      } else {
        box.className = 'result-box result-error';
        document.getElementById('resultIcon').innerText = '⚠️';
        document.getElementById('resultName').innerText = '';
        document.getElementById('resultType').innerText = '';
        document.getElementById('resultTime').innerText = '';
        document.getElementById('resultErrorText').innerText = res.message;
      }
    }

    function restartScan() {
      isProcessing = false;
      document.getElementById('resultBox').classList.add('hidden');
      document.getElementById('scanSection').classList.remove('hidden');
      if (html5QrCode) { html5QrCode.resume(); }
    }
  </script>
</body>
</html>
